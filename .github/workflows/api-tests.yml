name: API Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: test

      - name: Wait for server
        run: sleep 10

      - name: Run API test suite
        run: node scripts/api-test-suite.js --base-url=http://localhost:3000

  test-api-production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: test-api
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API test suite against production
        run: node scripts/api-test-suite.js --base-url=https://d2d-blitz.vercel.app
        continue-on-error: true  # Don't block deployment if prod tests fail
